<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Land LMS | المنصة التعليمية المتكاملة</title>
    <style>
        :root { --primary: #1e3a8a; --secondary: #10b981; --bg: #021222; --text: #1e293b; --danger: #ef4444; --locked: #cbd5e1; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 15px; }
        .global-header { text-align: center; margin-top: 5px; margin-bottom: 20px; }
        .global-logo { max-width: 140px; border-radius: 8px; }
        .container { background: white; padding: 15px; margin: 15px auto; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); border-top: 5px solid var(--primary); text-align: center; box-sizing: border-box; width: 100%; max-width: 800px; }
        .landing-wrapper { display: flex; flex-direction: column; gap: 0; margin: 0 auto; border-radius: 12px; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.2); width: 100%; max-width: 1000px; }
        .slider-container { position: relative; height: 220px; }
        .login-wrapper { background: white; padding: 25px 15px; text-align: center; display: flex; flex-direction: column; justify-content: center; }
        @media(min-width: 768px) { .container { padding: 30px; margin: 40px auto; } .landing-wrapper { flex-direction: row; } }
        .slide { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; transition: opacity 1s ease-in-out; display: flex; flex-direction: column; justify-content: flex-end; padding: 30px 20px; box-sizing: border-box; background-size: cover; background-position: center; }
        .slide.active { opacity: 1; z-index: 2; }
        .slide-content { position: relative; z-index: 3; color: white; text-align: right; }
        input, select, textarea { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #e2e8f0; border-radius: 8px; text-align: center; font-size: 16px; box-sizing: border-box; }
        button { width: 100%; background-color: var(--primary); color: white; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; }
        .hidden { display: none !important; }
        #videoSplashSection { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: #021222; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .btn-skip { position: absolute; bottom: 40px; z-index: 2; background-color: rgba(255, 255, 255, 0.1); border: none; color: white; padding: 12px 30px; border-radius: 25px; }
        .grid-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; margin-top: 20px; }
        .info-card { background: #f1f5f9; padding: 12px; border-radius: 8px; border: 1px solid #e2e8f0; }
        .payment-status { font-weight: bold; padding: 6px 10px; border-radius: 5px; font-size: 13px; }
        .material-item { background: #f1f5f9; margin: 8px 0; padding: 12px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; }
        .modal { position: fixed; z-index: 10000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.7); display: flex; justify-content: center; align-items: center; }
        .modal-content { background-color: #fff; padding: 25px; border-radius: 12px; width: 90%; max-width: 600px; text-align: right; }
        /* استايل اللعبة الجديد */
        .game-modal-content { background: #0f172a !important; color: white !important; }
        .game-btn { background: var(--secondary); color: white; border: none; padding: 15px; border-radius: 50px; font-size: 16px; margin: 10px; width: 100%; cursor: pointer; }
    </style>
</head>
<body>

<div class="global-header"><img src="logo.png?v=18" alt="English Land Logo" class="global-logo"></div>

<!-- واجهة الهبوط -->
<div id="landingPage" class="landing-wrapper">
    <div class="slider-container"><div class="slide active" style="background-image: url('https://images.unsplash.com/photo-1573164713988-8665fc963095?auto=format&fit=crop&w=1000&q=80');"><div class="slide-content"><h2>احتراف الإنجليزية للكبار</h2><p>بيئة تعليمية مصممة خصيصاً لتطوير مهاراتك المهنية واللغوية بثقة تامة.</p></div></div></div>
    <div class="login-wrapper">
        <h2>English Land LMS</h2>
        <input type="text" id="universalId" placeholder="ID">
        <input type="password" id="universalPass" placeholder="كلمة المرور">
        <button onclick="handleLogin()">تسجيل الدخول</button>
        <div id="errorMsg" style="color:red; margin-top:15px;"></div>
    </div>
</div>

<div id="videoSplashSection" class="hidden">
    <video id="introVideo" autoplay muted playsinline><source src="intro.mp4?v=18" type="video/mp4"></video>
    <button class="btn-skip" id="skipBtn" onclick="skipIntroVideo()">تخطي الفيديو ⏭️</button>
</div>

<!-- لوحة تحكم الطالب -->
<div class="container hidden" id="studentDashboard">
    <h2 id="welcomeStudent">مرحباً بك</h2>
    <div class="grid-cards"><div class="info-card"><h4>الكورس</h4><strong id="courseName"></strong></div><div class="info-card"><h4>المجموعة</h4><strong id="groupName"></strong></div></div>
    <div class="card-section"><div class="card-title">📝 الواجبات</div>
        <select id="studentHwLecture" onchange="loadStudentHomework()"></select>
        <div id="hwSubmitMsg"></div>
        <div id="homeworkQuizContainer" class="hidden"></div>
    </div>
    <div id="materialsList"></div>
</div>

<!-- نافذة اللعبة -->
<div id="gameModal" class="modal hidden">
    <div class="modal-content game-modal-content">
        <span onclick="closeGameModal()" style="float:left; cursor:pointer; font-size:24px;">&times;</span>
        <div id="gameContent"></div>
    </div>
</div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxjjZmjHiv3WB8JS5CXjhYE_de3jCh9RuIlManhPRdJcgWtaoiOcsg4jYMyMWisCem7/exec";
    let cachedUserData = null;
    
    function parseJSONSafe(str) { try { return JSON.parse(str); } catch(e) { return {}; } }

    async function handleLogin() {
        const id = document.getElementById('universalId').value.trim();
        const pass = document.getElementById('universalPass').value.trim();
        fetch(`${GAS_URL}?action=login&id=${id}&pass=${encodeURIComponent(pass)}`)
            .then(res => res.json())
            .then(data => {
                if(data.error) return alert(data.error);
                cachedUserData = data;
                document.getElementById('landingPage').classList.add('hidden');
                document.getElementById('studentDashboard').classList.remove('hidden');
                // تكملة عرض البيانات...
            });
    }

    // منطق اللعبة
    function launchMyGame(content) {
        const lines = content.split('\n').filter(l => l.includes('|'));
        const gameQs = lines.map(line => { const p = line.split('|'); return { q: p[0], c: p.slice(1,4), a: p[4].trim() }; });
        let qIdx = 0, score = 0;
        
        function render() {
            if(qIdx >= gameQs.length) { document.getElementById('gameContent').innerHTML = `<h3>انتهت اللعبة! نقاطك: ${score}</h3>`; return; }
            const q = gameQs[qIdx];
            let html = `<h4>${q.q}</h4>`;
            q.c.forEach(c => html += `<button class="game-btn" onclick="check('${c.trim()}', '${q.a}')">${c}</button>`);
            document.getElementById('gameContent').innerHTML = html;
        }
        
        window.check = (c, a) => { if(c === a) score += 10; qIdx++; render(); };
        document.getElementById('gameModal').classList.remove('hidden');
        render();
    }

    function closeGameModal() { document.getElementById('gameModal').classList.add('hidden'); }

    function loadStudentHomework() {
        const lec = document.getElementById('studentHwLecture').value;
        const wObj = parseJSONSafe(cachedUserData.student.homework.writing);
        const hwContent = wObj[lec] || ""; 
        const gameBtnArea = document.getElementById('hwSubmitMsg');
        
        if (hwContent.startsWith("TYPE:GAME")) {
            gameBtnArea.innerHTML = `<button onclick="launchMyGame('${hwContent}')" style="background:var(--secondary); padding:10px; width:100%; border:none; color:white; border-radius:8px;">🎮 ابدأ تحدي المحاضرة</button>`;
        }
    }
</script>
</body>
</html>
