<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <title>English Land LMS</title>
    <style>
        :root { --primary: #1e3a8a; --secondary: #10b981; --bg: #021222; }
        body { font-family: sans-serif; background-color: var(--bg); margin: 0; padding: 15px; }
        .container { background: white; padding: 20px; border-radius: 12px; max-width: 800px; margin: auto; text-align: center; }
        .hidden { display: none !important; }
        button { background: var(--primary); color: white; padding: 12px; border: none; border-radius: 8px; cursor: pointer; width: 100%; margin-top: 10px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #e2e8f0; border-radius: 8px; box-sizing: border-box; }
        
        /* Game Engine Styles */
        .game-screen { position: fixed; top:0; left:0; width:100%; height:100%; background: #0f172a; z-index: 20000; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .game-card { background: white; color: #1e293b; padding: 30px; border-radius: 20px; width: 90%; max-width: 500px; text-align: center; }
        .game-btn { background: var(--secondary); color: white; border: none; padding: 15px 30px; border-radius: 50px; font-size: 18px; margin: 10px; cursor: pointer; }
        .score-board { font-size: 24px; font-weight: bold; margin-bottom: 20px; color: #fbbf24; }
    </style>
</head>
<body>

<!-- واجهة الدخول -->
<div id="landingPage" class="container">
    <h2>English Land LMS</h2>
    <input type="text" id="universalId" placeholder="ID">
    <input type="password" id="universalPass" placeholder="كلمة المرور">
    <button onclick="handleLogin()">دخول 🔒</button>
    <div id="errorMsg" style="color:red; margin-top:10px;"></div>
</div>

<!-- واجهة اللعبة المدمجة -->
<div id="gameEngine" class="game-screen hidden">
    <div class="score-board">النقاط: <span id="currentScore">0</span></div>
    <div id="gameContent" class="game-card"></div>
</div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxjjZmjHiv3WB8JS5CXjhYE_de3jCh9RuIlManhPRdJcgWtaoiOcsg4jYMyMWisCem7/exec";
    let currentGameData = [], currentScore = 0, currentIdx = 0, studentId = "";

    async function handleLogin() {
        const id = document.getElementById('universalId').value.trim();
        const pass = document.getElementById('universalPass').value.trim();
        studentId = id;
        
        try {
            const res = await fetch(`${GAS_URL}?action=login&id=${id}&pass=${encodeURIComponent(pass)}`);
            const data = await res.json();
            if(data.error) throw new Error(data.error);
            document.getElementById('landingPage').classList.add('hidden');
            // هنا تكملة عرض الداشبورد...
        } catch(e) { document.getElementById('errorMsg').innerText = e.message; }
    }

    // محرك الألعاب المصغر
    function startGame(gameData) {
        currentGameData = gameData; currentScore = 0; currentIdx = 0;
        document.getElementById('gameEngine').classList.remove('hidden');
        renderQuestion();
    }

    function renderQuestion() {
        const q = currentGameData[currentIdx];
        const container = document.getElementById('gameContent');
        if(!q) { finishGame(); return; }
        
        let html = `<h3>${q.question}</h3>`;
        q.choices.forEach(c => {
            html += `<button class="game-btn" onclick="checkAnswer('${c}', '${q.answer}')">${c}</button>`;
        });
        container.innerHTML = html;
    }

    function checkAnswer(choice, answer) {
        if(choice.trim().toLowerCase() === answer.trim().toLowerCase()) {
            currentScore += 10;
            document.getElementById('currentScore').innerText = currentScore;
        }
        currentIdx++;
        renderQuestion();
    }

    async function finishGame() {
        document.getElementById('gameEngine').classList.add('hidden');
        alert("انتهت اللعبة! مجموع نقاطك: " + currentScore);
        await fetch(GAS_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: `action=submitGameScore&studentId=${encodeURIComponent(studentId)}&score=${currentScore}`
        });
    }

    // دالة فحص الملف المرفوع إذا كان لعبة
    function initContent(data) {
        if(data.startsWith("TYPE:GAME")) {
            const lines = data.split('\n');
            const gameQs = lines.slice(1).map(line => {
                const parts = line.split('|');
                return { question: parts[0], choices: parts.slice(1,4), answer: parts[4] };
            });
            startGame(gameQs);
        } else {
            // تشغيل النظام التقليدي
        }
    }
</script>
</body>
</html>
